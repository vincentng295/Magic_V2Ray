<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic V2Ray Control Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Magic V2Ray</h1>
                <div class="status-badge" id="service-status">Status: Checking...</div>
            </div>
            <div class="lang-switcher">
                <select id="lang-select" onchange="changeLanguage(this.value)" style="padding: 4px 8px; border-radius: 4px; background: var(--bg-panel, #222); color: var(--text-main, #fff); border: 1px solid #444;">
                    <option value="en">English</option>
                    <option value="vi">Tiếng Việt</option>
                </select>
            </div>
        </header>

        <div class="tabs-navigation">
            <button class="tab-btn active" onclick="switchTab('tab-dashboard')" data-i18n="tab_dashboard">Dashboard</button>
            <button class="tab-btn" onclick="switchTab('tab-settings')" data-i18n="tab_settings">Traffic Settings</button>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            <section class="control-actions">
                <button class="btn btn-start" onclick="toggleService('start')" data-i18n="btn_start">Start Engine</button>
                <button class="btn btn-stop" onclick="toggleService('stop')" data-i18n="btn_stop">Stop Engine</button>
            </section>

            <section class="import-section">
                <h3 data-i18n="import_title">Import Configuration Profile</h3>
                <textarea id="import-input" data-i18n-placeholder="import_placeholder" placeholder="Paste Sub Link (https://...) or Manual String (vless://, vmess://, trojan://) here..."></textarea>
                <div class="import-btn-row">
                    <button class="btn btn-primary btn-import-main" onclick="processImport()" data-i18n="btn_import">Process Connection Link</button>
                    <div class="import-add-menu-container">
                        <button class="btn btn-add-node" onclick="toggleImportAddMenu(event)" title="More import options">+</button>
                        <div id="import-add-dropdown" class="import-add-dropdown">
                            <button onclick="importFromClipboard(); closeImportAddMenu();" data-i18n="import_from_clipboard">Import from Clipboard</button>
                            <button onclick="importFromFile(); closeImportAddMenu();" data-i18n="import_from_file">Import from File</button>
                            <div class="import-add-divider"></div>
                            <button onclick="openNewNodeModal('vmess'); closeImportAddMenu();" data-i18n="add_vmess">Add VMess</button>
                            <button onclick="openNewNodeModal('vless'); closeImportAddMenu();" data-i18n="add_vless">Add VLESS</button>
                            <button onclick="openNewNodeModal('trojan'); closeImportAddMenu();" data-i18n="add_trojan">Add Trojan</button>
                            <button onclick="openNewNodeModal('shadowsocks'); closeImportAddMenu();" data-i18n="add_shadowsocks">Add Shadowsocks</button>
                            <button onclick="openNewNodeModal('wireguard'); closeImportAddMenu();" data-i18n="add_wireguard">Add WireGuard</button>
                            <button onclick="openNewNodeModal('hysteria2'); closeImportAddMenu();" data-i18n="add_hysteria2">Add Hysteria2</button>
                            <button onclick="openNewNodeModal('socks'); closeImportAddMenu();" data-i18n="add_socks">Add SOCKS</button>
                            <button onclick="openNewNodeModal('http'); closeImportAddMenu();" data-i18n="add_http">Add HTTP Proxy</button>
                        </div>
                    </div>
                </div>
                <input type="file" id="import-file-input" accept=".txt,.conf,.json" style="display:none;" onchange="handleFileImport(event)">
            </section>

            <section class="profiles-section">
                <h3 data-i18n="categories_title">Connection Categories</h3>
                <div id="profiles-container"></div>
            </section>
        </div>

        <div id="tab-settings" class="tab-content">
            <section class="settings-form-panel">
                <h3 data-i18n="adv_settings_title">Advanced Engine Settings</h3>
                
                <div class="settings-group-box">
                    <h4 data-i18n="group_routing">Routing & Core Protocol</h4>
                    
                    <div class="setting-item-row">
                        <label data-i18n="lbl_loglevel">Level Logging</label>
                        <select id="set-loglevel">
                            <option value="none">None</option>
                            <option value="debug">Debug</option>
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                        </select>
                    </div>

                    <div class="setting-item-row toggle-row">
                        <label for="set-sniffing"><span data-i18n="lbl_sniffing">Enable Sniffing</span><small data-i18n="desc_sniffing">Sniff domains from packet stream</small></label>
                        <input type="checkbox" id="set-sniffing">
                    </div>

                    <div class="setting-item-row toggle-row">
                        <label for="set-routeonly"><span data-i18n="lbl_routeonly">Enable RouteOnly</span><small data-i18n="desc_routeonly">Only sniff for route filtering</small></label>
                        <input type="checkbox" id="set-routeonly">
                    </div>

                    <div class="setting-item-row toggle-row">
                        <label for="set-preferipv6"><span data-i18n="lbl_preferipv6">Prefer IPv6</span><small data-i18n="desc_preferipv6">Prioritize IPv6 address routes</small></label>
                        <input type="checkbox" id="set-preferipv6">
                    </div>

                    <div class="setting-item-row toggle-row">
                        <label for="set-dnsviaproxy"><span data-i18n="lbl_dnsviaproxy">Resolve DNS via Proxy</span><small data-i18n="desc_dnsviaproxy">Wrap and route all DNS resolver via Server</small></label>
                        <input type="checkbox" id="set-dnsviaproxy">
                    </div>

                    <div class="setting-item-row toggle-row">
                        <label for="set-fakedns"><span data-i18n="lbl_fakedns">Enable Fake DNS</span><small data-i18n="desc_fakedns">Use pool 198.18.0.0/15 to map domains onto virtual IPs instantly</small></label>
                        <input type="checkbox" id="set-fakedns">
                    </div>

                    <div class="setting-item-row">
                        <label><span data-i18n="lbl_pinned_cert">Pinned Peer Cert SHA256</span><small data-i18n="desc_pinned_cert">Pin the SHA256 hash of the server certificate.</small></label>
                        <input type="text" id="set-pinned-cert" placeholder="">
                    </div>
                </div>

                <div class="settings-group-box">
                    <div class="setting-item-row toggle-row">
                        <h4 data-i18n="group_mux">Multiplexing (MUX)</h4>
                        <input type="checkbox" id="set-mux" onchange="toggleSubSettingField('set-mux', 'mux-sub-fields')">
                    </div>
                    <div id="mux-sub-fields" class="sub-setting-panel">
                        <div class="setting-item-row">
                            <label data-i18n="lbl_mux_concurrency">Max Concurrency Connections</label>
                            <input type="number" id="set-mux-connections" min="1" max="1024" value="8">
                        </div>
                    </div>
                </div>

                <div class="settings-group-box">
                    <div class="setting-item-row toggle-row">
                        <h4 data-i18n="group_fragment">Firewall Fragment (Anti-DPI)</h4>
                        <input type="checkbox" id="set-fragment" onchange="toggleSubSettingField('set-fragment', 'fragment-sub-fields')">
                    </div>
                    <div id="fragment-sub-fields" class="sub-setting-panel">
                        <div class="setting-item-row">
                            <label data-i18n="lbl_frag_packets">Fragment Packets Target</label>
                            <select id="set-fragment-packets">
                                <option value="tlshello">tlshello</option>
                            </select>
                        </div>
                        <div class="setting-item-row">
                            <label data-i18n="lbl_frag_length">Fragment Length (min-max)</label>
                            <input type="text" id="set-fragment-length" placeholder="50-100">
                        </div>
                        <div class="setting-item-row">
                            <label data-i18n="lbl_frag_interval">Fragment Interval (min-max)</label>
                            <input type="text" id="set-fragment-interval" placeholder="10-20">
                        </div>
                    </div>
                </div>

                <div class="settings-group-box">
                    <h4 data-i18n="group_network">Network Interfaces</h4>
                    <div class="setting-item-row">
                        <label data-i18n="lbl_mtu">Maximum Transmission Unit (MTU)</label>
                        <input type="number" id="set-mtu" value="1350">
                    </div>
                </div>

                <button class="btn btn-primary btn-save-settings" onclick="saveAdvancedSettingsForm()" data-i18n="btn_save_settings">Save & Apply Configurations</button>
            </section>
        </div>
    </div>
    <script src="helper.js"></script>
    <script src="i18n.js"></script>
    <script src="main.js"></script>
    <div id="toast-container" class="toast-container"></div>
    <div id="edit-node-modal" class="modal-overlay" style="display: none;">
        <div class="modal-window">
            <header class="modal-header">
                <button class="modal-icon-btn" onclick="closeEditNodeModal()">←</button>
                <h2 id="modal-edit-title-text" data-i18n="modal_edit_title">Config settings</h2>
                <button class="modal-icon-btn check-btn" onclick="saveEditedNode()">✓</button>
            </header>
            <div class="modal-body">
                <div class="edit-item-field">
                    <label data-i18n="lbl_remarks">Remarks</label>
                    <input type="text" id="edit-remarks">
                </div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_address">Address</label>
                    <input type="text" id="edit-address">
                </div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_port">Port</label>
                    <input type="number" id="edit-port">
                </div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_id">ID / Password</label>
                    <input type="text" id="edit-uuid">
                </div>
                <div id="subfields-vmess" class="conditional-fields">
                    <div class="edit-item-field" id="field-group-alterid">
                        <label data-i18n="lbl_alterid">Alter ID</label>
                        <input type="number" id="edit-alterid" min="0" placeholder="0">
                    </div>
                </div>
                <div class="edit-item-field" id="field-group-encryption">
                    <label data-i18n="lbl_encryption">Encryption</label>
                    <select id="edit-encryption">
                        <option value="auto">auto</option>
                        <option value="none">none</option>
                        <option value="zero">zero</option>
                        <option value="aes-128-gcm">aes-128-gcm</option>
                        <option value="chacha20-poly1305">chacha20-poly1305</option>
                    </select>
                </div>
                <div class="edit-item-field" id="field-group-flow">
                    <label data-i18n="lbl_flow">Flow</label>
                    <select id="edit-flow">
                        <option value="">none</option>
                        <option value="xtls-rprx-vision">xtls-rprx-vision</option>
                        <option value="xtls-rprx-vision-udp443">xtls-rprx-vision-udp443</option>
                    </select>
                </div>

                <!-- Shadowsocks encryption method -->
                <div class="edit-item-field" id="field-group-ss-method" style="display:none;">
                    <label data-i18n="lbl_ss_method">Encryption Method</label>
                    <select id="edit-ss-method">
                        <option value="aes-256-gcm">aes-256-gcm</option>
                        <option value="aes-128-gcm">aes-128-gcm</option>
                        <option value="chacha20-poly1305">chacha20-poly1305</option>
                        <option value="xchacha20-poly1305">xchacha20-poly1305</option>
                        <option value="2022-blake3-aes-128-gcm">2022-blake3-aes-128-gcm</option>
                        <option value="2022-blake3-aes-256-gcm">2022-blake3-aes-256-gcm</option>
                        <option value="2022-blake3-chacha20-poly1305">2022-blake3-chacha20-poly1305</option>
                        <option value="none">none</option>
                        <option value="plain">plain</option>
                    </select>
                </div>

                <!-- WireGuard-specific fields -->
                <div id="subfields-wireguard" class="conditional-fields" style="display:none;">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_wg_secret_key">Secret Key (Private Key)</label>
                        <input type="text" id="edit-wg-secret-key" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_wg_public_key">Server Public Key</label>
                        <input type="text" id="edit-wg-public-key" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_wg_preshared_key">Pre-Shared Key (optional)</label>
                        <input type="text" id="edit-wg-preshared-key" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_wg_reserved">Reserved (optional)</label>
                        <input type="text" id="edit-wg-reserved" placeholder="0,0,0">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_wg_local_address">Local Address</label>
                        <input type="text" id="edit-wg-local-address" placeholder="172.16.0.2/32">
                    </div>
                </div>

                <!-- Hysteria2-specific fields -->
                <div id="subfields-hysteria2" class="conditional-fields" style="display:none;">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_obfs_password">Obfs Password (optional)</label>
                        <input type="text" id="edit-hy2-obfs-password" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_port_hopping">Port Hopping Range</label>
                        <input type="text" id="edit-hy2-port-hopping" placeholder="e.g. 20000-30000">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_hop_interval">Hop Interval (seconds)</label>
                        <input type="number" id="edit-hy2-hop-interval" placeholder="30" min="1">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_bandwidth_down">Bandwidth Down</label>
                        <input type="text" id="edit-hy2-bandwidth-down" placeholder="100m">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_bandwidth_up">Bandwidth Up</label>
                        <input type="text" id="edit-hy2-bandwidth-up" placeholder="20m">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_hy2_tls">TLS (SNI)</label>
                        <input type="text" id="edit-hy2-sni" placeholder="example.com">
                    </div>
                </div>

                <!-- SOCKS / HTTP proxy auth fields -->
                <div id="subfields-proxy-auth" class="conditional-fields" style="display:none;">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_proxy_username">Username (optional)</label>
                        <input type="text" id="edit-proxy-username" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_proxy_password">Password (optional)</label>
                        <input type="text" id="edit-proxy-password" placeholder="">
                    </div>
                </div>

                <!-- TRANSPORT section (hidden for WG / Hysteria2 / SOCKS / HTTP) -->
                <div id="section-transport-wrapper">
                <div class="modal-section-divider" data-i18n="categories_title">TRANSPORT</div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_transport_net">Network</label>
                    <select id="edit-network" onchange="updateEditFormVisibility()">
                        <option value="tcp">tcp</option>
                        <option value="kcp">kcp</option>
                        <option value="ws">ws</option>
                        <option value="httpupgrade">httpupgrade</option>
                        <option value="xhttp">xhttp</option>
                        <option value="h2">h2</option>
                        <option value="grpc">grpc</option>
                    </select>
                </div>

                <!-- TCP: Header Type -->
                <div class="edit-item-field" id="field-group-header-type">
                    <label data-i18n="lbl_header_type">Header Type</label>
                    <select id="edit-header-type" onchange="updateEditFormVisibility()">
                        <option value="none">none</option>
                        <option value="http">http</option>
                    </select>
                </div>
                <!-- TCP: HTTP Host (shown when header-type=http) -->
                <div id="subfields-tcp-http" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_tcp_http_host">HTTP Host</label>
                        <input type="text" id="edit-tcp-http-host" placeholder="example.com">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_tcp_http_path">HTTP Path</label>
                        <input type="text" id="edit-tcp-http-path" placeholder="/">
                    </div>
                </div>

                <!-- KCP subfields -->
                <div id="subfields-kcp" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_kcp_header">Header Type</label>
                        <select id="edit-kcp-header">
                            <option value="none">none</option>
                            <option value="srtp">srtp</option>
                            <option value="utp">utp</option>
                            <option value="wechat-video">wechat-video</option>
                            <option value="dtls">dtls</option>
                            <option value="wireguard">wireguard</option>
                            <option value="dns">dns</option>
                        </select>
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_kcp_host">Host</label>
                        <input type="text" id="edit-kcp-host" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_kcp_seed">KCP Seed</label>
                        <input type="text" id="edit-kcp-seed" placeholder="">
                    </div>
                </div>

                <!-- WS subfields -->
                <div id="subfields-ws" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_ws_path">WebSocket Path</label>
                        <input type="text" id="edit-ws-path" placeholder="/">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_ws_host">WebSocket Host</label>
                        <input type="text" id="edit-ws-host">
                    </div>
                </div>

                <!-- HTTPUpgrade subfields -->
                <div id="subfields-httpupgrade" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_httpupgrade_host">HTTPUpgrade Host</label>
                        <input type="text" id="edit-httpupgrade-host" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_httpupgrade_path">HTTPUpgrade Path</label>
                        <input type="text" id="edit-httpupgrade-path" placeholder="/">
                    </div>
                </div>

                <!-- XHTTP subfields -->
                <div id="subfields-xhttp" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_xhttp_mode">XHTTP Mode</label>
                        <select id="edit-xhttp-mode">
                            <option value="auto">auto</option>
                            <option value="packet-up">packet-up</option>
                            <option value="stream-up">stream-up</option>
                            <option value="stream-one">stream-one</option>
                        </select>
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_xhttp_host">XHTTP Host</label>
                        <input type="text" id="edit-xhttp-host" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_xhttp_path">XHTTP Path</label>
                        <input type="text" id="edit-xhttp-path" placeholder="/">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_xhttp_extra">XHTTP Extra</label>
                        <textarea id="edit-xhttp-extra" rows="3" placeholder='{"noGRPCHeader":false}'></textarea>
                    </div>
                </div>

                <!-- H2 subfields -->
                <div id="subfields-h2" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_h2_host">H2 Host</label>
                        <input type="text" id="edit-h2-host" placeholder="">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_h2_path">H2 Path</label>
                        <input type="text" id="edit-h2-path" placeholder="/">
                    </div>
                </div>

                <!-- gRPC subfields -->
                <div id="subfields-grpc" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_grpc_mode">gRPC mode</label>
                        <select id="edit-grpc-mode">
                            <option value="gun">gun</option>
                            <option value="multi">multi</option>
                        </select>
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_grpc_auth">gRPC Authority</label>
                        <input type="text" id="edit-grpc-auth">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_grpc_service">gRPC serviceName</label>
                        <input type="text" id="edit-grpc-service">
                    </div>
                </div>

                </div><!-- end section-transport-wrapper -->

                <!-- SECURITY section (hidden for WireGuard / SOCKS / HTTP / Hysteria2) -->
                <div id="section-security-wrapper">
                <div class="modal-section-divider" data-i18n="lbl_tls">SECURITY</div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_tls">TLS</label>
                    <select id="edit-security" onchange="updateEditFormVisibility()">
                        <option value="none">none</option>
                        <option value="tls">tls</option>
                        <option value="reality">reality</option>
                    </select>
                </div>

                <div id="subfields-tls" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_sni">SNI</label>
                        <input type="text" id="edit-sni">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_fingerprint">Fingerprint</label>
                        <select id="edit-fingerprint">
                            <option value="chrome">chrome</option>
                            <option value="firefox">firefox</option>
                            <option value="safari">safari</option>
                            <option value="edge">edge</option>
                            <option value="qq">qq</option>
                            <option value="random">random</option>
                        </select>
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_alpn">ALPN</label>
                        <input type="text" id="edit-alpn" placeholder="h2,http/1.1">
                    </div>
                </div>

                <div id="subfields-reality" class="conditional-fields">
                    <div class="edit-item-field">
                        <label data-i18n="lbl_pbk">Public Key</label>
                        <input type="text" id="edit-pbk">
                    </div>
                    <div class="edit-item-field">
                        <label data-i18n="lbl_sid">Short ID</label>
                        <input type="text" id="edit-sid">
                    </div>
                </div>
                </div><!-- end section-security-wrapper -->
            </div>
        </div>
    </div>
    <!-- Edit Subscription Modal -->
    <div id="edit-sub-modal" class="modal-overlay" style="display: none;">
        <div class="modal-window">
            <header class="modal-header">
                <button class="modal-icon-btn" onclick="closeEditSubModal()">←</button>
                <h2 data-i18n="modal_edit_sub_title">Edit Subscription</h2>
                <button class="modal-icon-btn check-btn" onclick="saveEditedSubscription()">✓</button>
            </header>
            <div class="modal-body" style="padding: 16px; display: flex; flex-direction: column; gap: 14px;">
                <div class="edit-item-field">
                    <label data-i18n="lbl_sub_cat_name">Category Name</label>
                    <input type="text" id="edit-sub-cat-name">
                </div>
                <div class="edit-item-field">
                    <label data-i18n="lbl_sub_url">Subscription URL</label>
                    <input type="text" id="edit-sub-url" placeholder="https://...">
                </div>
                <div class="setting-item-row toggle-row" style="padding: 0;">
                    <label class="toggle-switch">
                        <span data-i18n="lbl_sub_dedup">Deduplicate configurations when fetching</span>
                    </label>
                    <input type="checkbox" id="edit-sub-dedup" checked>
                    <span class="toggle-slider"></span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
